<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Kén Ngủ V2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="auth.js?v=10"></script>
    <script src="ken-core.js?v=5"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none; user-select: none; cursor: default;
        }
        input { -webkit-user-select: text; user-select: text; cursor: text; }

        .auth { display: flex; min-height: 100vh; }
        /* Nửa trái: ảnh campus */
        .auth-photo {
            flex: 1.4;
            background: url('login-bg.png') left center / cover no-repeat;
        }
        /* Nửa phải: form đăng nhập */
        .auth-panel {
            flex: 1; min-width: 340px; max-width: 560px;
            display: flex; align-items: center; justify-content: center;
            padding: 32px; background: #fff;
        }
        .auth-form { width: 100%; max-width: 384px; }

        .brand-logo { height: 70px; display: block; margin-bottom: 16px; }
        .brand-sub { font-size: 15px; color: #0E7C8B; font-weight: 700; line-height: 1.45; }
        .brand-sub small { display: block; color: #7a8a90; font-weight: 500; font-size: 12px; margin-top: 6px; }

        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #e5e7eb; margin: 22px 0 20px; }
        .tab { padding: 8px 0; font-size: 14px; color: #9aa3a8; font-weight: 600; }
        .tab.active { color: #0E7C8B; border-bottom: 2px solid #0E7C8B; }

        .field {
            width: 100%; padding: 13px 14px; border: 1px solid #d4d9dd; border-radius: 8px;
            font-size: 15px; margin-bottom: 14px; outline: none; background: #fff;
        }
        .field:focus { border-color: #0E7C8B; }

        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; font-size: 13px; flex-wrap: wrap; gap: 8px; }
        .remember { display: flex; align-items: center; gap: 7px; color: #3a3a3c; cursor: pointer; }
        .remember input { width: auto; margin: 0; accent-color: #0E7C8B; }
        .link { color: #0E7C8B; text-decoration: none; font-weight: 600; }

        .btn-login {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            background: #0E7C8B; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: .2s;
        }
        .btn-login:hover { background: #0a626e; }
        .btn-login:active { transform: scale(0.99); }
        .btn-login:disabled { opacity: .6; cursor: progress; }

        .error-msg { color: #e0352b; font-size: 13px; min-height: 18px; margin-top: 12px; text-align: center; font-weight: 500; }
        .foot { text-align: center; margin-top: 22px; }
        .foot .hint { color: #8e8e93; font-size: 12px; line-height: 1.5; }

        @media (max-width: 820px) {
            .auth-photo { display: none; }
            .auth-panel { flex: 1; max-width: none; }
        }
    </style>
</head>
<body>

<div class="auth">
    <div class="auth-photo"></div>

    <div class="auth-panel">
        <div class="auth-form">
            <img src="Logo_UEH_xanh.png" alt="UEH University" class="brand-logo">
            <div class="brand-sub">
                Hệ thống Kén Ngủ Smart Pod — UEH
                <small>Xác minh tài khoản để sử dụng hệ thống / Verify your account</small>
            </div>

            <div class="tabs">
                <span class="tab active">Mật khẩu / Password</span>
            </div>

            <input type="text" id="txtUser" class="field" placeholder="Tài khoản / Account" autocomplete="off" autocapitalize="none">
            <input type="password" id="txtPassword" class="field" placeholder="Mật khẩu / Password">

            <div class="row">
                <label class="remember">
                    <input type="checkbox" id="chkRemember" checked>
                    Nhớ đăng nhập / Remember me?
                </label>
                <a href="#" class="link" onclick="alert('Vui lòng liên hệ Admin để được cấp lại mật khẩu.');return false;">Quên mật khẩu?</a>
            </div>

            <button class="btn-login" id="btnLogin" onclick="handleLogin()">Đăng nhập / Sign in</button>
            <div class="error-msg" id="lblError"></div>

            <div class="foot">
                <div class="hint">Quản trị: <b>Admin</b> · Sinh viên: đăng nhập bằng <b>MSSV (11 số)</b><br>Mật khẩu mặc định tài khoản mới: <b>123456</b></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Đã ghi nhớ đăng nhập (còn hạn 30 ngày) -> vào thẳng, khỏi nhập lại
    if (sessionStorage.getItem("user_name")) {
        window.location.href = KenAuth.homeUrl();
    }

    // ===== Khởi tạo Firebase =====
    firebase.initializeApp(KEN_FIREBASE_CONFIG);
    const database = firebase.database();

    // ===== Đảm bảo tài khoản Admin (bất di bất dịch) luôn tồn tại =====
    // Chỉ tạo khi chưa có, KHÔNG ghi đè để giữ mật khẩu Admin đã đổi.
    (async function ensureAdmin() {
        try {
            const snap = await database.ref('accounts/Admin').once('value');
            if (!snap.exists()) {
                const hash = await KenAuth.hashPassword(KenAuth.ADMIN_DEFAULT_PASSWORD); // "A@a123"
                await database.ref('accounts/Admin').set({
                    passwordHash: hash,
                    role: "admin",
                    dashboard: true,
                    locked: true,          // không cho phép xóa / đổi tên
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
            }
        } catch (e) { console.error("Khởi tạo Admin thất bại:", e); }
    })();

    const inputUser = document.getElementById('txtUser');
    const inputPass = document.getElementById('txtPassword');
    const lblError = document.getElementById('lblError');
    const btnLogin = document.getElementById('btnLogin');

    // Cho phép nhấn Enter để đăng nhập
    [inputUser, inputPass].forEach(el => el.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    }));

    async function handleLogin() {
        lblError.innerText = "";

        let username = inputUser.value.trim();
        const pass = inputPass.value;

        if (username === "" || pass === "") {
            lblError.innerText = "Vui lòng điền đầy đủ thông tin!";
            return;
        }

        // "admin" gõ kiểu gì cũng quy về đúng key "Admin"
        if (username.toLowerCase() === "admin") username = "Admin";

        // Tên đăng nhập chỉ gồm chữ Latin + số (chặn ký tự đặc biệt phá path Firebase)
        if (!KenAuth.isValidCredential(username)) {
            lblError.innerText = "Tài khoản không tồn tại!";
            return;
        }

        btnLogin.disabled = true;
        btnLogin.innerText = "Đang kiểm tra...";

        try {
            const snap = await database.ref('accounts/' + username).once('value');
            const acc = snap.val();

            if (!acc) {
                lblError.innerText = "Tài khoản không tồn tại!";
                return;
            }

            const inputHash = await KenAuth.hashPassword(pass);
            if (inputHash !== acc.passwordHash) {
                lblError.innerText = "Mật khẩu không chính xác!";
                return;
            }

            // Chặn đăng nhập nếu tài khoản đang bị khoá do spam
            const blk = KenBan.blockState(acc);
            if (blk) { lblError.innerText = blk.msg; return; }

            // ===== Đăng nhập thành công: thiết lập phiên làm việc =====
            const role = acc.role || "user";
            const canDashboard = (role === "admin") || (acc.dashboard === true);

            sessionStorage.setItem("user_role", role);
            sessionStorage.setItem("user_name", username);
            sessionStorage.setItem("user_fullname", acc.hoTen || (role === "admin" ? "Admin" : username));
            sessionStorage.setItem("perm_dashboard", canDashboard ? "true" : "false");

            // Nếu chọn "Duy trì đăng nhập" -> lưu phiên 30 ngày vào trình duyệt
            if (document.getElementById('chkRemember').checked) KenAuth.rememberSession();

            // Admin -> trang tổng quan (3 mục); user thường -> trang đặt kén
            window.location.href = (role === "admin") ? "home.html" : "booking.html";
        } catch (err) {
            lblError.innerText = "Lỗi kết nối hệ thống. Thử lại!";
            console.error(err);
        } finally {
            btnLogin.disabled = false;
            btnLogin.innerText = "Đăng nhập / Sign in";
        }
    }
</script>
</body>
</html>
