<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Kén Ngủ V2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="auth.js?v=8"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f2f2f7;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-user-select: none; -moz-user-select: none; user-select: none; cursor: default;
        }
        input, textarea { -webkit-user-select: text; -moz-user-select: text; user-select: text; cursor: text; }
        .login-card {
            width: 100%;
            max-width: 360px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        h3 { color: #1c1c1e; margin-bottom: 24px; font-size: 22px; }
        .input-group { text-align: left; margin-bottom: 16px; }
        label { font-size: 13px; color: #8e8e93; font-weight: 600; display: block; margin-bottom: 6px; }
        input {
            width: 100%; padding: 12px; border: 1px solid #c7c7cc; border-radius: 10px;
            font-size: 16px; box-sizing: border-box; outline: none; background: #fafafa;
        }
        input:focus { border-color: #007aff; background: #fff; }
        .btn-login {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: #007aff; color: white; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: 10px; transition: 0.2s;
        }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.6; cursor: progress; }
        .error-msg { color: #ff3b30; font-size: 13px; margin-top: 12px; min-height: 18px; font-weight: 500; }
        .hint { color: #8e8e93; font-size: 12px; margin-top: 16px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="login-card">
    <h3>KÉN NGỦ SMART POD V2</h3>

    <div class="input-group">
        <label>TÊN ĐĂNG NHẬP:</label>
        <input type="text" id="txtUser" placeholder="Nhập tên đăng nhập..." autocomplete="off" autocapitalize="none">
    </div>

    <div class="input-group">
        <label>MẬT KHẨU:</label>
        <input type="password" id="txtPassword" placeholder="Nhập mật khẩu...">
    </div>

    <button class="btn-login" id="btnLogin" onclick="handleLogin()">Đăng Nhập Hệ Thống</button>
    <div class="error-msg" id="lblError"></div>
    <div class="hint">Quản trị: <b>Admin</b> · Sinh viên: đăng nhập bằng <b>MSSV (11 số)</b><br>Mật khẩu mặc định tài khoản mới: <b>123456</b></div>
</div>

<script>
    // ===== Khởi tạo Firebase =====
    firebase.initializeApp(KEN_FIREBASE_CONFIG);
    const database = firebase.database();

    // ===== Đảm bảo tài khoản Admin (bất di bất dịch) luôn tồn tại =====
    // Chỉ tạo khi chưa có, KHÔNG ghi đè để giữ mật khẩu Admin đã đổi.
    (async function ensureAdmin() {
        try {
            const snap = await database.ref('accounts/Admin').once('value');
            if (!snap.exists()) {
                const hash = await KenAuth.hashPassword(KenAuth.ADMIN_DEFAULT_PASSWORD); // "A@a123"
                await database.ref('accounts/Admin').set({
                    passwordHash: hash,
                    role: "admin",
                    dashboard: true,
                    locked: true,          // không cho phép xóa / đổi tên
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
            }
        } catch (e) { console.error("Khởi tạo Admin thất bại:", e); }
    })();

    const inputUser = document.getElementById('txtUser');
    const inputPass = document.getElementById('txtPassword');
    const lblError = document.getElementById('lblError');
    const btnLogin = document.getElementById('btnLogin');

    // Cho phép nhấn Enter để đăng nhập
    [inputUser, inputPass].forEach(el => el.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    }));

    async function handleLogin() {
        lblError.innerText = "";

        let username = inputUser.value.trim();
        const pass = inputPass.value;

        if (username === "" || pass === "") {
            lblError.innerText = "Vui lòng điền đầy đủ thông tin!";
            return;
        }

        // "admin" gõ kiểu gì cũng quy về đúng key "Admin"
        if (username.toLowerCase() === "admin") username = "Admin";

        // Tên đăng nhập chỉ gồm chữ Latin + số (chặn ký tự đặc biệt phá path Firebase)
        if (!KenAuth.isValidCredential(username)) {
            lblError.innerText = "Tài khoản không tồn tại!";
            return;
        }

        btnLogin.disabled = true;
        btnLogin.innerText = "Đang kiểm tra...";

        try {
            const snap = await database.ref('accounts/' + username).once('value');
            const acc = snap.val();

            if (!acc) {
                lblError.innerText = "Tài khoản không tồn tại!";
                return;
            }

            const inputHash = await KenAuth.hashPassword(pass);
            if (inputHash !== acc.passwordHash) {
                lblError.innerText = "Mật khẩu không chính xác!";
                return;
            }

            // ===== Đăng nhập thành công: thiết lập phiên làm việc =====
            const role = acc.role || "user";
            const canDashboard = (role === "admin") || (acc.dashboard === true);

            sessionStorage.setItem("user_role", role);
            sessionStorage.setItem("user_name", username);
            sessionStorage.setItem("user_fullname", acc.hoTen || (role === "admin" ? "Admin" : username));
            sessionStorage.setItem("perm_dashboard", canDashboard ? "true" : "false");

            // Admin -> trang tổng quan (3 mục); user thường -> trang đặt kén
            window.location.href = (role === "admin") ? "home.html" : "booking.html";
        } catch (err) {
            lblError.innerText = "Lỗi kết nối hệ thống. Thử lại!";
            console.error(err);
        } finally {
            btnLogin.disabled = false;
            btnLogin.innerText = "Đăng Nhập Hệ Thống";
        }
    }
</script>
</body>
</html>
